# Build and publish the documentation site.
#
# - On a push to `main`, the site is published to the root of the `docs` branch
#   so it serves at `https://shelving.cc/` (the GitHub Pages custom domain).
# - On a pull request, the site is published under `pr-<number>/` on the same branch
#   so a preview is available at `https://shelving.cc/pr-<number>/`. The preview URL
#   surfaces via a GitHub Deployment (`docs-preview` environment) on the PR.
# - When a pull request is closed, its preview directory is removed from `docs` and its
#   `docs-preview` deployments are deleted.
name: Docs
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# Scope concurrency per PR (and per ref for branch pushes) so one PR's build — or `main`'s — never
# supersedes another's. A single shared group meant only the newest *pending* run survived, so a PR
# whose build was still queued got silently dropped whenever anything else pushed.
# - `github.event.pull_request.number` keys every event of a PR (open/sync/reopen/close) to the same
#   group; `github.ref` keys branch pushes (e.g. `main`) to their own. A PR-close cleanup therefore
#   shares only that PR's group and can never cancel the `main` deploy.
# - `cancel-in-progress: false` still never interrupts an in-progress publish mid-push; within a group,
#   rapid pushes simply collapse to the latest commit.
# Trade-off: different groups can now run concurrently, so two publishes could race on the push to the
# shared `docs` branch. Each writes its own directory (`pr-<n>/` or the root) with `keep_files: true`,
# so the only conflict is the git push itself — rare given build times, and recoverable by a re-run.
concurrency:
  group: docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    # Records a GitHub Deployment so the commit / PR / branch shows a "View deployment" link
    # pointing at the published site. PRs deploy to the shared `docs-preview` environment (URL
    # per-PR); pushes to `main` deploy to `docs`. The job's success/failure sets the status.
    environment:
      name: ${{ github.event_name == 'pull_request' && 'docs-preview' || 'docs' }}
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: install
        run: bun install
      # Resolve the URL the build is served from — the single source for both the deployment
      # `environment.url` (above) and `APP_URL` (below). Includes the `pr-<number>/` subfolder for PRs.
      - name: url
        id: url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=https://shelving.cc/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://shelving.cc/" >> "$GITHUB_OUTPUT"
          fi
      # `APP_URL` must match where the build is served so links and assets resolve; the docs build
      # normalises it to a trailing slash (see `docs/env.ts`), so the resolved URL above feeds it directly.
      - name: build
        run: APP_URL="${{ steps.url.outputs.url }}" bun run docs:build
      # `keep_files: true` leaves every existing `pr-<number>/` preview untouched. Do NOT add
      # `exclude_assets: pr-*` here — peaceiris's `exclude_assets` runs `rm -rf` on matching
      # paths in the publish branch, so it would delete every PR preview on each main deploy.
      # `cname` writes a `CNAME` file at the publish-branch root so GitHub Pages serves the site
      # from the custom domain `shelving.cc`. Only set here (not in the preview deploy) — its
      # `destination_dir` would otherwise write `CNAME` inside `pr-<number>/`, where it does nothing.
      - name: deploy (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.build/docs
          publish_branch: docs
          keep_files: true
          cname: shelving.cc
      - name: deploy (preview)
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.build/docs
          publish_branch: docs
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

  teardown:
    name: Teardown
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - name: checkout docs branch
        uses: actions/checkout@v6
        with:
          ref: docs
          fetch-depth: 0
      - name: teardown (preview)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -d "pr-${PR_NUMBER}" ]; then
            rm -rf "pr-${PR_NUMBER}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: remove docs preview for PR #${PR_NUMBER}"
            git push
          fi
      # GitHub never deletes deployment records on its own, so the `docs-preview` deployments this
      # PR created would linger forever pointing at a now-removed preview. Mark them inactive (you
      # can't delete an active deployment) then delete them.
      - name: teardown (deployments)
        uses: actions/github-script@v8
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'docs-preview',
              ref: `refs/pull/${context.issue.number}/merge`,
            });
            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
              await github.rest.repos.deleteDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
              });
            }
