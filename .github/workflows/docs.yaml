# Build and publish the documentation site.
#
# - On a push to `main`, the site is published to the root of the `docs` branch
#   so it serves at `https://<owner>.github.io/<repo>/`.
# - On a pull request, the site is published under `pr-<number>/` on the same branch
#   so a preview is available at `https://<owner>.github.io/<repo>/pr-<number>/`. A
#   comment is added (or updated) on the PR with the preview URL.
# - When a pull request is closed, its preview directory is removed from `docs`.
name: Docs
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

# Serialize every run onto a single queue. All runs publish to the `docs`
# branch, so they must not race; and a PR-close cleanup run must never cancel
# the main-branch deploy that publishes the site root.
concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    name: Build and deploy
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    # Records a GitHub Deployment so the commit / PR / branch shows a "View deployment" link
    # pointing at the published site. PRs deploy to the shared `docs-preview` environment (URL
    # per-PR); pushes to `main` deploy to `docs`. The job's success/failure sets the status.
    environment:
      name: ${{ github.event_name == 'pull_request' && 'docs-preview' || 'docs' }}
      url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: install
        run: bun install
      # Resolve the URL the build will be served from — reused as the deployment environment URL.
      - name: url
        id: url
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi
      # APP_URL must match where the build is actually served so links and assets resolve correctly.
      - name: build (main)
        if: github.event_name != 'pull_request'
        run: APP_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" bun run docs:build
      # PR previews are served from the `pr-<number>/` sub-directory, so the build resolves against that.
      - name: build (preview)
        if: github.event_name == 'pull_request'
        run: APP_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}" bun run docs:build
      # `keep_files: true` leaves every existing `pr-<number>/` preview untouched. Do NOT add
      # `exclude_assets: pr-*` here — peaceiris's `exclude_assets` runs `rm -rf` on matching
      # paths in the publish branch, so it would delete every PR preview on each main deploy.
      - name: deploy (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.build/docs
          publish_branch: docs
          keep_files: true
      - name: deploy (preview)
        if: github.event_name == 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.build/docs
          publish_branch: docs
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true
      - name: comment preview URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            **Docs preview** for this PR:

            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}/

            Updated on every push.

  cleanup:
    name: Remove closed PR preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      deployments: write
    steps:
      - name: checkout docs branch
        uses: actions/checkout@v6
        with:
          ref: docs
          fetch-depth: 0
      - name: remove preview directory
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -d "pr-${PR_NUMBER}" ]; then
            rm -rf "pr-${PR_NUMBER}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: remove docs preview for PR #${PR_NUMBER}"
            git push
          fi
      # GitHub never deletes deployment records on its own, so the `docs-preview` deployments this
      # PR created would linger forever pointing at a now-removed preview. Mark them inactive (you
      # can't delete an active deployment) then delete them.
      - name: remove PR deployments
        uses: actions/github-script@v8
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'docs-preview',
              ref: `refs/pull/${context.issue.number}/merge`,
            });
            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive',
              });
              await github.rest.repos.deleteDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
              });
            }
      - name: update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            Docs preview for this PR has been removed.
